name: Sync PR descriptions to main

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  sync-description:
    if: ${{ github.head_ref == 'testing' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Build PR body from merged feature PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const testingPR = context.payload.pull_request;

            // Find the last merge commit from testing into main
            const commits = await github.rest.repos.compareCommits({
              owner, repo,
              base: 'main',
              head: 'testing',
            });

            // Collect merged PRs into testing (exclude the testing→main PR itself)
            const mergedPRs = await github.rest.pulls.list({
              owner, repo,
              state: 'closed',
              base: 'testing',
              per_page: 50,
              sort: 'updated',
              direction: 'desc',
            });

            // Filter to PRs merged after the last main←testing sync
            // Use the base commit date as the cutoff
            const baseSha = commits.data.merge_base_commit.sha;
            const baseCommit = await github.rest.repos.getCommit({ owner, repo, ref: baseSha });
            const cutoff = new Date(baseCommit.data.commit.committer.date);

            const relevant = mergedPRs.data.filter(pr =>
              pr.merged_at && new Date(pr.merged_at) > cutoff
            );

            if (relevant.length === 0) {
              console.log('No feature PRs found since last sync — leaving description unchanged.');
              return;
            }

            const sections = relevant.map(pr => {
              const body = pr.body ? pr.body.trim() : '_No description provided._';
              return [
                `### #${pr.number} — ${pr.title}`,
                '',
                body,
              ].join('\n');
            });

            const newBody = [
              '## What\'s included',
              '',
              sections.join('\n\n---\n\n'),
            ].join('\n');

            const date = new Date().toISOString().slice(0, 10);
            const newTitle = `release: testing → main (${date})`;

            await github.rest.pulls.update({
              owner, repo,
              pull_number: testingPR.number,
              title: newTitle,
              body: newBody,
            });

            console.log(`Updated PR #${testingPR.number} — title: "${newTitle}", ${relevant.length} feature PR(s).`);
